# Image Generation Style Registry
#
# Defines visual styles for the Nano Banano image generator.
# Each style includes a suffix that gets appended to prompts.

styles:
  kk:
    name: "BC + AI Brand"
    default: true
    description: "Professional, modern editorial style with dark backgrounds"
    suffix: |
      Style guidelines: Dark background (#0f0f1a to #1a1a2e gradient), teal (#00c8b4) and purple (#9333ea) accent colors, high contrast, modern editorial illustration style, professional and polished.

  hopecode:
    name: "HOPECODE"
    description: "Solarpunk mycelial mapping, anti-corporate, organic aesthetic"
    suffix: |
      Style guidelines: Solarpunk mycelial mapping aesthetic. Linework: Jittered, hand-drawn, non-Euclidean, meandering paths with human imperfection. Color: Earth tones (ochre, ash, rust, moss) with spectral interference (iridescent oil slick, electric fungi glow) - atmospheric, not flat. Texture: Paper grain, analog bleed, archival rot, photocopy scars - should look found, not made. Typography: Monospace code font crossbred with field notes and marginalia. Tone: Irreverent, embodied, visionary, anti-colonial. Structure: Nodes (people/places/values), Branches (non-linear relationships), Zones (contexts/vibes), Glyphs (layered symbols). Organic, anti-corporate, mycelial network visualization.

  bcai:
    name: "BC AI Community Centre"
    description: "Mycelial network ecosystem, organic-professional, BC natural environment"
    suffix: |
      Style guidelines: BC AI Community Centre mycelial network aesthetic. Metaphor: Visualize as interconnected mycelial network - organic, branching connections like forest fungal networks. Philosophy: Organic over mechanical, connection over isolation, growth over stasis. Color Palette: Deep Forest Green (#1E3A2B), Coast Blue (#175E7C), Earth Brown (#78552B) as primary colors. Birch White (#F7F4E9), Twilight Purple (#523E7B), Sunrise Orange (#D35C37) as secondary accents. Growth Green (#68B091) for highlights. Visual Elements: Organic branching connections with subtle glowing edges, nodes with radial gradients from center to edge, varying node sizes showing importance. Connection paths should be irregular and natural, not perfectly symmetrical. Typography: Modern sans-serif for clarity (Montserrat Bold for headings, Open Sans for body). Nodes: Circular with soft edges, light drop shadows. Layout: Radial from center or distributed network, never purely hierarchical. Composition: Minimum 15% white space, emphasize natural flow and organic growth patterns. Professional yet rooted in BC's natural environment - rainforest meets innovation.

  futureproof-mythic:
    name: "Futureproof Mythic"
    description: "Surrealist PNW folk-myth direction for Futureproof Festival worlds, rituals, creatures, and posters"
    suffix: |
      Style guidelines: Futureproof Mythic visual language. Build surrealist Pacific Northwest folk-myth scenes that feel handmade, symbolic, and slightly dream-struck rather than corporate. Core motifs: watchful eyes, ravens, salmon, orcas, whales, bears, eagles, cedar forests, river-hair, portals, councils, cabinets of wonders, talismans, seed vaults, glowing laboratories, and figures walking toward a threshold. Composition: dense but readable story images, poster-like or artifact-like, with one strong mythic focal point and smaller symbolic details orbiting it. Texture: painted folk-art surfaces, analog grain, hand-touched edges, imperfect symmetry, luminous mist, and warm festival-night atmosphere. Palette: deep forest shadow, ocean teal, aurora cyan, coral pink, ember gold, cedar brown, and occasional electric bioluminescent accents. Technology should appear as living pattern - circuit tattoos, DNA constellations, mycelial roots, data trails in water or sky - never as sterile dashboards, robots, generic glowing brains, or hard corporate UI. Tone: wonder, invitation, ancestral futurism, collective imagination, and "build what lasts."

  bcai-ecosystem:
    name: "BC AI Ecosystem"
    description: "BC + AI logo-forward ecosystem, credential, badge, and network language for polished community assets"
    suffix: |
      Style guidelines: BC AI Ecosystem visual language. Use the BC + AI mark, circular badges, credentials, track emblems, ecosystem maps, portals, and collectible artifacts as the main design grammar. The logo or BC + AI identity should feel embedded in a living network, not pasted on afterward: set it inside DNA rings, eye-garden mandalas, circuit forests, mycelial maps, track badge stacks, heartbeat horizons, or luminous gateways. Composition: cleaner and more presentation-ready than the mythic style, with strong hierarchy, generous margins, reusable campaign layout, and clear space for event titles, dates, partner names, or track labels. Palette: deep forest green, blackened evergreen, coast teal, cyan aurora, warm gold, birch white, and restrained coral accents. Motifs: connected track badges, nodes and organic circuits, ravens and salmon as border elements, Vancouver/BC landscape silhouettes, credentials, stickers, speaker cards, sponsor thank-yous, schedules, and ecosystem diagrams. Tone: premium community infrastructure, trustworthy civic innovation, rooted in BC nature, polished enough for partners while still alive with festival energy. Avoid generic tech branding, sterile SaaS gradients, stock conference visuals, and mystical clutter that makes the BC + AI identity hard to read.

  aefl:
    name: "AI Ethical Futures Lab"
    description: "Civic policy lab graphics: field notes, working-room proof, trust, thread, and public-interest rigor"
    suffix: |
      Style guidelines: AI Ethical Futures Lab visual language. Make the image feel like the working room where policy becomes practice: civic field notes, facilitated rooms, practical public-interest artifacts, warm table light, worksheets, careful synthesis, room trust, accountability, and human values. Use sparse thread or woven-material metaphors for holding tensions together, but never a dense web. Composition: one clear visual idea, matte dark editorial surface, generous negative space, crisp readable poster hierarchy, stable BC+AI logo/tagline zone, and a calm partner-facing finish. Palette: near-black ink, black-green, deep blue-violet, warm amber, coral, soft paper-gold, coast teal, mint, and acid-lime accents used with restraint. Texture: subtle paper tooth, pencil softness, thread fiber, warm glow, and clean premium print finish. Typography: crisp editorial sans-serif; generated text must be designed into the poster, not overlaid afterward. Hard bans: no circuit boards, PCB traces, chip diagrams, electronic schematics, dense dot-line webs, node maps, constellation networks, mycelial maps, credential boards, certification graphics, badges, seals, medallions, emblems, generic AI stock visuals, robots, glowing brains, dashboards, fake UI, fake sponsor marks, fake venue claims, fake dates, fake URLs, campfires, canoes, faux-Indigenous motifs, ritual scenes, culture cosplay, corporate hype, sterile boardrooms, dirty grunge, clutter, or extra readable text.

  upgrade:
    name: "The Upgrade AI"
    description: "Bold transformation aesthetic, energetic, empowerment-focused"
    suffix: |
      Style guidelines: The Upgrade AI brand aesthetic - bold transformation and empowerment. Color Palette: Deep Purple (wisdom, transformation - primary), Bright Orange (energy, action - accent), Light Blue (technology, trust - secondary), White (clarity - background). Use prism colors for callouts and highlights. High contrast, energetic color combinations that feel both professional and dynamic. Typography: Sans-serif bold for headings (confident, modern), clean readable serif for body text (approachable wisdom), sans-serif all caps for calls-to-action (energy, urgency). Visual Metaphors: Transformation imagery (before/after, upgrades, leveling up), technology empowerment, human + AI partnership, professional growth, skill development, breakthrough moments. Tone: Bold and energetic yet welcoming, tech-forward but human-centered, edgy yet accessible. "Creative chaos meets polished execution" - professional with personality. Imagery: Abstract technological graphics (never intimidating), approachable instructor/professional headshots, before/after transformation visuals, arrows pointing upward, progress indicators, unlock/level-up metaphors. Avoid: robotic AI clichés, dystopian tech, anything cold or alienating. Composition: Dynamic layouts with clear focal points, CTAs prominently placed, enough white space for clarity but with energetic use of accent colors. Visual hierarchy should guide eye toward transformation story. Brand Promise: AI amplifies human potential, technology in service of people, accessible expertise, collaborative learning community. Every visual should feel empowering, never overwhelming.

  zine:
    name: "Punk Zine (BWR)"
    description: "Black/white/blood-red xerox-grain collage — WAIFF / resistance zine aesthetic"
    suffix: |
      Style guidelines: Black white and blood red only — strict, no other colors permitted. Xerox grain throughout; fourth-generation photocopy look with blown contrast and halftone dots breaking up every surface. Cut-and-paste collage energy with torn paper edges, visible tape and glue, staple holes, coffee stains, and ink smudges — should look assembled at midnight on someone's bedroom floor. Mixed-media ransom-note typography: stencil spray, typewriter, hand-cut magazine letters, and marker scrawls layered at chaotic angles. Dense overlapping collage with ripped fragments, newspaper clippings pasted at angles, taped crooked. Anarcho-punk / DIY zine tone: anti-corporate, raw, handmade, urgent. Photocopied political broadsheet energy — not polished, not designed, assembled.

  gni:
    name: "GNI Cosmic Editorial"
    description: "Space-blue orbital diagrams — editorial meets engineering, constellation metaphors"
    suffix: |
      Style guidelines: Deep space-blue gradient background (near-black to rich midnight blue) — no organic, mycelial, or earth-tone aesthetic. Constellation and orbit metaphors: radial nodes connected by glowing orbit trails, dotted orbital paths, prism splits for duality, swarm-of-dots to signal transformations. Editorial precision at cosmic scale: clean sans-serif labels, UX-overlay clarity, modular tile compositions on galaxy-blue. Data as astronomy: subjects rendered as star fields, neural meshes, or constellation maps with glow trails along logic paths and gradient pulses marking transformation. Icon vocabulary: wands for generative AI, lightning-through-brain for inference, prisms for bias/duality, avatar node clusters for community. Tone: science-fiction journalism — playful precision, not flat corporate; editorial meets engineering.

  femme:
    name: "Femme / Body-Compute (MAC)"
    description: "Abstract body-compute metaphors — intimate, non-literal, membrane/network aesthetic for MAC community content"
    suffix: |
      Style guidelines: Abstract body-compute metaphor aesthetic for Mind, AI & Consciousness (MAC) work. Palette: deep indigo/obsidian background with blush-magenta, warm amber, and faint teal; obsidian + opalescent pastels (peach, lilac, seafoam) with sparse gold sparks; midnight base with saturated pops (fuchsia, tangerine, turquoise, lemon) for routing/network imagery. Motifs: contour fields implying shape without drawing bodies, membrane boundaries with selective permeability and slow gradients, network routing that prioritizes gentleness over efficiency, gradient pulses for hormonal or cyclical rhythms, nested containers and organelle-like forms, accumulated micro-pressures and soft grid textures. Tone: quiet, intimate, embodied intelligence — should look found or dreamed, not diagrammed. CRITICAL avoid-clauses: no goddess iconography, no hearts, no obvious pregnancy or embryo imagery, no moons or period-blood clichés, no calendars, no medical-illustration anatomy, no brain silhouettes, no circuit-board motifs, no chakras, no sacred geometry, no crystals, no literal fingerprint patterns, no faces.

  mac:
    name: "Mind, AI & Consciousness (MAC)"
    description: "MAC brand-identity tile system — abstract generative data-art on near-black, scientific-sublime, with MAC wordmark + colored topic kicker"
    suffix: |
      Style guidelines: Mind, AI & Consciousness (MAC) brand-identity aesthetic. A single abstract generative data-art form centered on a near-black (#0a0a0a) or deep indigo-navy field. Pick ONE motif per image: dense particle/dot fields forming waves or fingerprint-like contour ridges; topographic contour-line maps (concentric ridges radiating from a center); flowing wireframe line-fields that resolve into a face/head in profile; radial kaleidoscopic mirror symmetry; iridescent moiré mesh with soft spectral gradients; or a glowing spectrogram waveform. Color two ways — either moody and near-monochrome with ONE accent hue (acid/emerald green, crimson-and-cobalt, warm copper, or opalescent pastel), OR a bold high-saturation symmetric kaleidoscope (electric blue or crimson against black). Tone: scientific-sublime, contemplative, premium-editorial; about emergence and consciousness-as-data — never literal glowing brains, humanoid robots, or circuit boards. Composition: one strong focal form with generous calm negative space, reserving clean room top-left and bottom-left for a wordmark and title block. Typography system (only when text is requested): "MAC" set large in bold white geometric sans (Montserrat/Gotham-like) in the top-left (or centered for bold kaleidoscope variants); "Mind, AI & Consciousness" in white bold sans at bottom-left; directly beneath it a smaller ALL-CAPS kicker line ("MONTH YEAR | TOPIC") in the image's accent color. Avoid: stock tech clichés, glowing-brain icons, humanoid robots, circuit-board traces, flat corporate SaaS gradients, busy clutter, more than one focal form.

  mac-workshop:
    name: "MAC Workshop (Riso / Tactile)"
    description: "Nested workshop-series variant of mac — same dark generative-art DNA, but rendered as a risograph/screenprint: heavy grain, halftone, warm two-ink duotone, slight overprint misregistration. Handmade studio-press feel."
    suffix: |
      Style guidelines: MAC Workshop sub-brand — the hands-on "studio session" track within the Mind, AI & Consciousness (MAC) family. Keep the MAC DNA: a single abstract generative data-art form (particle field, contour topography, line-field portrait, mesh, ripple, or waveform) on a deep near-black ground, ONE focal form with generous negative space, scientific-sublime and contemplative. WORKSHOP DIFFERENTIATOR — render the whole tile as a RISOGRAPH / SCREENPRINT rather than a smooth digital image: visible paper-grain and tooth, coarse halftone dot screens breaking up the tones, gritty stochastic grain, and the warm-ink areas printed slightly OFF-REGISTER from the dark plate so edges show a subtle ink-offset ghost. Strict warm two-ink DUOTONE only: a deep ink (near-black / very dark ink-blue) plus ONE warm spot ink — riso orange / coral (around #FF6A3D) shading to amber — and that warm ink is the single accent; absolutely none of the deep-dive's cool teal/blue/green glow. The generative form glows in the warm ink, mottled and grainy like real risograph, never smooth or photographic. Tactile, handmade, printed-in-the-studio — like a beautiful art-print pulled off the press, not a polished render. Typography when text is requested: a small stamped/letterpress-style "WORKSHOP" label (looks inked, slightly imperfect) near the MAC wordmark; "MAC" in large bold sans in warm paper-cream or off-white; "Mind, AI & Consciousness" in the same cream bold sans at the bottom-left; and beneath it a smaller all-caps kicker in the warm orange ink ("MAC WORKSHOP | TOPIC"). Text should sit cleanly and stay crisply legible even over the grain. Avoid: blueprints, technical grids, graph paper, registration crop-marks, monospace/engineering vibe, glowing-brain icons, humanoid robots, circuit boards, flat corporate gradients, cool-only palettes, clutter, more than one focal form.

  indigenomics:
    name: "Indigenomics Institute"
    description: "Ancestral wisdom + emergent tech — sovereignty-forward, land-based intelligence diagrams (community review required for nation-specific symbols)"
    suffix: |
      Style guidelines: Indigenomics Institute visual language bridging ancestral wisdom with emergent technology. Palette: deep navy/indigo/midnight blue (sky/spirit layer), burnt sienna/cedar brown/ochre (earth/ancestry layer), electric cyan/teal glow/copper/soft gold (tech/flow layer), white smoke/warm neon accents (data overlay). Motifs: braided organic-tech (sweetgrass, cedar, copper wire interlaced with fiber-optic threads and circuit traces), radial symmetry and circular flows (reciprocity over hierarchy), blueprint grids with organic overlays, river-shaped flow paths rather than flowchart arrows, geo-mapping with glowing nodes. Geometry: radial and circular layouts, never purely hierarchical. Data: relational and cyclical charts, flows of reciprocity. Tone: mythic realism meets cyberpunk; cosmic yet grounded; sovereignty-forward, not catch-up framing. IMPORTANT: Do not invent nation-specific cultural symbols — use abstract geometry and generalized land-based metaphors; reserve culturally specific references for human community review.

  cmvan:
    name: "Creative Mornings Vancouver / Punk Rock AI"
    description: "Maximalist punk collage — black/white halftone + blood red + hot pink/magenta, dripping paint type, fire and photographic objects embedded in chaos"
    suffix: |
      Style guidelines: Maximalist punk zine-collage aesthetic built on four colors: BLACK, WHITE halftone, BLOOD RED/CRIMSON, and HOT PINK/MAGENTA (neon, saturated — this is the key accent that separates this style from plain BWR zine). No other colors. Background alternates between pitch black and aged off-white torn paper. Typography treatments: MASSIVE dripping-paint display letters in red or hot pink, stencil-cut spray typography in contrast color, small torn-paper typewriter fragments at irregular angles (often partially legible), ransom-note cut letters, margin scrawl in marker — all layered at wildly different scales simultaneously. Photographic elements: high-contrast black-and-white halftone photography of physical objects (hands, boots, fire, tools, faces) treated with risograph/silkscreen grain before embedding — objects look photographically real but distressed into the collage. Texture: worn paper, xerox artifact, spray paint bleed, risograph misregistration, ink drip, coffee stain, torn edge with visible fiber. Collage density: MAXIMUM — at least 4–5 overlapping layers; small illegible text fragments scattered everywhere like wheat-paste wall. Energy: confrontational, urgent, visceral, political. NOT polished. NOT designed. Assembled with rage and love on a bedroom floor at midnight. Compare: more chaotic and color-saturated than the BWR zine style, more physical and photographic than flat stencil work. Every image should feel like it belongs stapled to a telephone pole outside a basement punk show.

  new-god-flow:
    name: "New God Flow"
    description: "Industrial minimalist luxury book-cover style with matte grounds, one iridescent foil accent, reverent anatomy, and classical serif type"
    suffix: |
      Style guidelines: New God Flow industrial minimalist luxury. Build a premium book-cover or record-sleeve object, not a glossy commercial poster. Substrate: stark matte ground, either deep soft-touch matte black or pure non-reflective matte white, with subtle premium paper or card grain; optional clear translucent plastic slipcase texture. Accent discipline: use exactly one color-shifting iridescent, holographic, dichroic, or oil-spill foil accent, applied sparingly to a single focal element so it reads as precious and otherworldly. Subject: reverent anatomical or medical-chart imagery such as linework figures, historical anatomical engraving, heart, jaw, spine, nervous system, or a body-as-instrument metaphor, rendered with scientific precision and liturgical seriousness. Typography: restrained classical serif, small caps, generous spacing, crisp white or foil; title at the top, author at the bottom, nothing crowded. Composition: extreme negative space, centered balance, gallery-grade calm. Tone: sacred, scientific, premium, otherworldly, contemporary art monograph meets luxury record sleeve. Avoid glitch, datamosh, RGB split, neon gradients, drop shadows, photographs of real people, busy collage, stock-tech cliches, cartoons, and any second accent color competing with the iridescence.

  # --- KK signature protest-sign styles (data-center "both hands full" series) ---
  # Type-forward poster artwork, NOT a photo of a sign, NOT cartoon, NOT art-history pastiche.

  kk-blocks:
    name: "KK Megacolor Block-Stack"
    description: "Stacked neon color-panel rows, each word its own clashing color, halftone + chromatic glitch — type-forward poster"
    suffix: |
      Style guidelines: Full-bleed protest-poster artwork — NOT a photo, no wall, no drop shadow; type and color fill the entire frame edge to edge. Massive bold geometric blocky sans-serif capitals, each word or line set inside its own rectangular color panel, panels stacked in horizontal bands across the whole poster. Vivid clashing neon palette — electric blue, acid green, hot magenta/pink, orange — high saturation, adjacent panels in different clashing colors. Halftone dot texture over the flat color, slight risograph overprint misregistration, RGB chromatic glitch offset on the letter edges. If the line clearly calls for an emblem, render it only as a bold flat geometric icon — absolutely NO cartoon faces, NO cute mascots, NO illustration, NO photo. Loud, designed, readable; rave-flyer / neo-brutalist screenprint energy.

  kk-cmyk:
    name: "KK CMYK Slab-Glitch"
    description: "Process yellow/cyan/magenta + black, fat condensed slab caps in stacked bands, halftone + RGB offset"
    suffix: |
      Style guidelines: Full-bleed protest-poster artwork — NOT a photo, bleeds to all four edges. Enormous fat CONDENSED slab / gothic capitals filling the frame, stacked tight in horizontal bands. Strict CMYK process palette ONLY — process yellow, process cyan, process magenta, and black — with words and bands alternating between these four colors. Heavy halftone dot screens, visible CMYK channel misregistration, RGB chromatic glitch offset on letter edges, ink-on-newsprint print texture. Very high contrast, punchy, mass-print screenprint energy. NO cartoon, NO illustration, NO photo. Loud, designed, perfectly readable.

  kk-glitch:
    name: "KK Datamosh Hard-Glitch"
    description: "Pixel-sort, RGB split, scanlines, cyan/magenta/black/white — corrupted-signal cyberpunk type"
    suffix: |
      Style guidelines: Full-bleed protest-poster artwork — NOT a photo, bleeds to all four edges. Heavy blocky / condensed capitals shattered by digital glitch: pixel-sort smears, datamosh, RGB channel split, horizontal scanlines and tracking errors, JPEG/compression artifacts, broken and stuttering letterforms that nonetheless stay LEGIBLE. Palette: electric cyan, hot magenta, black and white, with occasional acid-yellow; hard split color fields behind the type. Corrupted-signal, cyberpunk-error, datamosh energy. NO cartoon, NO illustration, NO photo. Loud, designed, readable.

  kk-acid:
    name: "KK Acid-Riso Distress"
    description: "Hot orange/red/yellow tritone, gritty riso grain, painterly distress, split zones — sun-faded hardcore gig poster"
    suffix: |
      Style guidelines: Full-bleed protest-poster artwork — NOT a photo, bleeds to all four edges. Massive heavy CONDENSED gothic / grotesque capitals filling the frame, often split into two stacked color zones. Hot limited tritone palette — acid yellow, hot orange, and blood red over black (a tight 2–3 colour risograph pairing, not rainbow). Gritty risograph grain, heavy halftone, painterly eroded / distressed ink texture, subtle cyan RGB glitch edge on the type. Sun-faded, sweat-soaked hardcore gig-poster / punk-flyer heat. NO cartoon, NO illustration, NO photo. Loud, designed, readable.

  # --- VANCOUVER MADE · MADE ON protest-kit companion clubs (ALLEY LEAGUE) ---
  # Counter-FIFA football kits: mimic the official polish, invert the payload, bake in the
  # receipt. Render-mode-neutral — palette + motifs + ethics live here; each prompt sets its
  # own background and composition (full-bleed mood plates AND white-background flats).

  n5orange:
    name: "Number Five Orange / Work Is Work"
    description: "Counter-FIFA away-strip protest kit — safety-cone orange official-drop gloss over a thermal-receipt labour manifest; nightlife-capitalism critique"
    suffix: |
      Style guidelines: VANCOUVER MADE "Number Five Orange" protest-kit visual language — a counterfeit-official FIFA-style football away strip that critiques nightlife capitalism, the spectacle economy and sex-work stigma. THE METHOD: mimic the official polish, invert the payload, bake in the receipt. REGISTER: gritty, edgy, darkly hilarious and scathing — the joke lands on nightlife capitalism, FIFA hospitality, stag tourism and the bylaw; the receipt is the punchline. Bite, not politeness. WORDMARK RULE: the front/chest reads VANCOUVER (a host-city wordmark), NOT "Vancouver Made" and NOT a brand lockup blasted across the chest; any "MADE ON" / Vancouver Made branding stays small on tags, neck labels or manifesto cards. THE TWO-DISTANCE TRICK is mandatory — at TV distance it reads as a glam, broadcast-ready, premium limited-edition away strip; up close it resolves into a labour manifest and an itemized cover charge. Strict palette: safety-cone orange #ff6a00 (the façade), vinyl black #0a0a0a, metallic merch gold #d9a521, neon marquee pink #ff2d6f — no other colours. Texture register: clean "technical flat-lay fashion illustration", "professional sports apparel", premium official-drop gloss (foil, hospitality-tier sheen, limited-edition stamp) deliberately bent into the language of a cover charge and a VIP rope; thermal-receipt mono microtype as the underbelly. Recurring motifs: a sleek vertical metallic "pole" stripe; an orange theatre/stage marquee; a buzzing neon door marquee; a velvet VIP rope, brass stanchion and tear-off paper wristband; repeating rubber-stamp "COVER CHARGE" marks; an itemized thermal-receipt "tab" (cover, drink minimum, "service fee"); a telecom/airline-style wordmark lockup. Typography: confident carrier-style sans-serif sponsor marks blended with faded thermal-receipt monospace fine print. HARD BANS: any human figure appears ONLY as an abstract, faceless flat silhouette — NEVER caricature workers, dancers, or staff, never a recognizable face or real-person likeness; punch UP at buyers, VIP culture and bylaw, never down. EVOKE the official tournament system (host-city shield, credential/sponsor-board language, the trophy) but NEVER reproduce real FIFA marks, real sponsor logos, or any actual trademark. Avoid: photo-realism, cartoon, clip-art, rainbow palettes.

  nardwuar:
    name: "Nardwuar FC / Deep Cut"
    description: "Counter-FIFA home kit as a walking archive — tartan host-nation polish over riso-zine cut-and-paste; research-as-protest homage (no likeness)"
    suffix: |
      Style guidelines: VANCOUVER MADE "Nardwuar FC" protest-kit visual language — a counterfeit-official FIFA-style host-nation home kit turned into a walking archive of a city's underground. THE METHOD: mimic the official polish, invert the payload, bake in the receipt; research is the protest, the receipt is the weapon. REGISTER: confrontational, gleefully satirical, scathing protest-kit parody — take the piss out of FIFA, sanitized civic PR, broadcast spin and unaccountable power; pull no punches at the institutions and the money. WORDMARK RULE: the front/chest of every kit reads exactly VANCOUVER (a bold host-nation wordmark — the single word VANCOUVER, NO year, NO '26, NO numbers beside it), NEVER "Nardwuar" or "Nardwuar FC" across the chest; the NARDWUAR!! wordmark appears ONLY as the back nameplate; club identity otherwise lives in the crest, badges and hem. CATCHPHRASE EASTER EGG: tuck a small "DOOT DOOLA DOOT DOO" (Nardwuar's sign-off) somewhere in the fine details — inside-collar tape, hem microprint, or a margin scrawl — as a cute hidden detail. THE TWO-DISTANCE TRICK is mandatory — at TV distance it reads as a bold, classic tartan host-nation home kit with broadcast polish; up close it resolves into a riso-printed cut-and-paste fanzine of records, flyers and interview microtext. Strict palette: tartan red #c8102e, vinyl ink #0a0a0a, tartan green #1d7a46, tartan yellow #e8c531 — plus bone newsprint for away variants; no other colours. Texture register: clean "technical flat-lay fashion illustration" / "professional sports apparel" on the surface, riso-zine grit underneath (xerox grain, photocopy scars, toner ink, slight misregistration). Recurring motifs: a ghosted woven tartan check printed faint into the fabric; ultra-faint all-over collage of 7-inch record labels, cassette J-card spines, VHS labels and photocopied punk show flyers; chaotic cut-and-paste ransom-note lettering; numbers built from tiny record-sleeve / zine-panel rectangles; a tam-o'-shanter hat silhouette; a vintage microphone on a chrome stand fused with a vinyl spindle; a press-accreditation laminate on a lanyard; dense monospace interview-quote microtext. HARD BANS: NO human face, NO portrait, NO recognizable likeness of any real person anywhere — this is an HOMAGE carried entirely through objects (tam silhouette, records, zines, mic stand), never the man. EVOKE the official tournament system (host-city shield, broadcast/credential language, the trophy) but NEVER reproduce real FIFA marks or any actual trademark. Avoid: photo-realism, cartoon, clip-art, smooth corporate vector polish.

  china-creek:
    name: "China Creek / Public Land"
    description: "Counter-FIFA home kit defending public space — concrete-grey city-pride gloss over skatepark bowls, griptape and the city's own NO SKATEBOARDING bylaw; criminalize-then-monetize critique"
    suffix: |
      Style guidelines: VANCOUVER MADE "China Creek" protest-kit visual language — a counterfeit-official FIFA-style host-city home kit that defends public space and skate/DIY culture against the criminalize-then-monetize playbook. THE METHOD: mimic the official polish, invert the payload, bake in the receipt; the home ground was never the gift, it was the fight. REGISTER: high-end and refined FIRST, defiant underneath — a premium, badass, editorial sports-fashion kit that reads as a covetable design object you'd actually want to wear; the protest lands quietly through restrained marks, never clutter; the bite is aimed at the bylaw, developers, redevelopment and the tourism/Olympic monetization of a subculture the city first policed. WORDMARK RULE: the front/chest reads exactly VANCOUVER (a bold host-city wordmark — the single word VANCOUVER, NO year, NO '26, NO numbers beside it), NEVER "China Creek" across the chest; the CHINA CREEK / LOCAL identity lives ONLY in the crest, badges, back nameplate and hem; any MADE ON / Vancouver Made branding stays small on tags and neck labels. THE TWO-DISTANCE TRICK is mandatory — at TV distance it reads as a premium, high-end, broadcast-ready city-pride home kit led by ONE hero element: an elegant tonal all-over pattern of nested skatepark bowl contours and coping curves; up close that pattern resolves into the defended-public-space payload, carried by small restrained marks (a tiny bylaw patch, a hem line, a tag), never a busy chest sticker. Strict palette: concrete grey #9aa0a3 (raw skatepark concrete), marker black #0a0a0a, caution yellow #f4c20d (city signage, the bylaw mark), creek teal #1f9e8a (coping line, accent) — plus brochure cream and gold for the "Skate Tourism" third kit only; no other colours. Texture register: premium high-end technical athletic apparel, editorial sports-fashion lookbook polish, refined and restrained with clean negative space; only a whisper of skate-concrete grit underneath (subtle griptape / concrete tone), never busy. HERO MOTIF (carries the whole kit): an elegant tonal all-over pattern of nested skatepark bowl contours and coping curves, thin caution-yellow and creek-teal line-art on the body. SUPPORTING MOTIFS, used SMALL and SPARINGLY: a clean bowl-and-coping crest; a discreet woven "NO SKATEBOARDING" bylaw patch (sleeve or tag, NEVER a large chest sticker); numbers built from coping curves; a small parks-permit closure-notice tag; a subtle skateboard-deck or bowl-coping trophy-misuse mark. Keep skateboard stickers, spray-stencil and zine collage to a MINIMUM — quiet accents only, never the focus. FIGURES: on flats and graphic elements, NO human figures — garments and objects only. On-body LOOKBOOK shots MAY show real models including faces, catalogue style; never a recognizable likeness of a specific named real person. ALWAYS punch UP at the bylaw, developers and monetization, never down at skaters, builders or youth. EVOKE the tournament and Olympic systems (host-city shield, broadcast/credential language, the trophy) but NEVER reproduce real FIFA marks, Olympic rings, real sponsor logos or any actual trademark. Avoid: busy sticker collage, competing graphics, newsprint chaos, cluttered surfaces, too many marks; also photo-realism, cartoon, clip-art, rainbow palettes.
