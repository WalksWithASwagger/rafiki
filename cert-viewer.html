<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Graphics Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .intro {
            text-align: center;
            color: #999;
            margin-bottom: 40px;
            font-size: 0.95em;
        }

        .program-section {
            margin-bottom: 60px;
        }

        .program-title {
            font-size: 1.8em;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #333;
            color: #fff;
        }

        .program-title.animation {
            color: #a78bfa;
        }

        .program-title.rap {
            color: #34d399;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: #555;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transform: translateY(-2px);
        }

        .card-image {
            width: 100%;
            aspect-ratio: 4/3;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-title {
            padding: 15px;
            font-size: 0.9em;
            color: #ccc;
            word-break: break-word;
        }

        .version-badge {
            display: inline-block;
            background: #333;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.75em;
            color: #999;
            margin-bottom: 8px;
        }

        .stats {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            padding: 20px;
            background: #111;
            margin-top: 40px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Certification Graphics</h1>
        <div class="intro">Pick the best designs for Animation Accelerator and Responsible AI Professional Program</div>

        <!-- Animation Accelerator Section -->
        <div class="program-section">
            <h2 class="program-title animation">🎬 Animation Accelerator</h2>
            <div class="grid" id="animationGrid"></div>
        </div>

        <!-- RAP Section -->
        <div class="program-section">
            <h2 class="program-title rap">🌱 Responsible AI Professional</h2>
            <div class="grid" id="rapGrid"></div>
        </div>

        <div class="stats">
            <strong id="totalCount">0</strong> certification designs across <strong id="versionCount">0</strong> versions
        </div>
    </div>

                    title: 'Spotlight Stage Ceremony',

                {

                    version: 'v4'
                }
            ]
        };

        function renderGrid(containerId, data) {
            const container = document.getElementById(containerId);
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-image">
                        <img src="${item.src}" alt="${item.title}">
                    </div>
                    <div class="card-title">
                        <div class="version-badge">${item.version}</div>
                        ${item.title}
                    </div>
                `;
                card.addEventListener('click', () => {
                    window.open(item.src);
                });
                container.appendChild(card);
            });
        }

        function updateStats() {
            const total = imageData.animation.length + imageData.rap.length;
            const versions = new Set([
                ...imageData.animation.map(d => d.version),
                ...imageData.rap.map(d => d.version)
            ]).size;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('versionCount').textContent = versions;
        }

        // Render all grids
        renderGrid('animationGrid', imageData.animation);
        renderGrid('rapGrid', imageData.rap);
        updateStats();
    </script>
</body>
</html>
