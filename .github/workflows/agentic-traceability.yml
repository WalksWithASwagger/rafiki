name: Agentic Policy

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review, converted_to_draft, closed, labeled, unlabeled]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: agentic-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  policy:
    if: ${{ startsWith(github.event.pull_request.head.ref, 'codex/issue-') }}
    name: policy
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Fetch PR policy metadata
        run: |
          gh pr view "$PR_NUMBER" --json body --jq '.body // ""' > "$RUNNER_TEMP/pr-body.md"
          gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName' > "$RUNNER_TEMP/head-ref.txt"
          gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")' > "$RUNNER_TEMP/labels.txt"
          {
            echo "HEAD_REF<<EOF"
            cat "$RUNNER_TEMP/head-ref.txt"
            echo "EOF"
            echo "PR_LABELS<<EOF"
            cat "$RUNNER_TEMP/labels.txt"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Check policy
        id: policy
        run: |
          set +e
          python3 scripts/agentic/pr_traceability.py \
            --pr-body-file "$RUNNER_TEMP/pr-body.md" \
            --head-ref "$HEAD_REF" \
            --labels "$PR_LABELS" \
            --json-output "$RUNNER_TEMP/pr-traceability.json"
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          traceability_ok=$(python3 -c 'import json, sys; print(str(json.load(open(sys.argv[1]))["checks"]["traceability_ok"]).lower())' "$RUNNER_TEMP/pr-traceability.json")
          echo "traceability_ok=$traceability_ok" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment traceability drift
        if: ${{ steps.policy.outputs.traceability_ok != 'true' && !(github.event.action == 'labeled' && github.event.label.name == 'needs-human') }}
        run: |
          python3 -c "import json; print(json.load(open('$RUNNER_TEMP/pr-traceability.json'))['comment'])" > "$RUNNER_TEMP/pr-traceability-comment.md"
          gh pr edit "$PR_NUMBER" --add-label "needs-human"
          gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/pr-traceability-comment.md"

      - name: Enforce policy
        env:
          POLICY_EXIT_CODE: ${{ steps.policy.outputs.exit_code }}
        run: exit "$POLICY_EXIT_CODE"
