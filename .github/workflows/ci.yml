name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Audit Node runtime dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Audit Python runtime dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Lint Python
        run: python -m ruff check .

      - name: Run tests
        run: npm test

      - name: Run portal E2E smoke
        run: npm run e2e:portal

      - name: Check documentation links
        run: npm run docs:check

      - name: Check public repo boundary
        run: npm run public:check

      - name: Check npm package contents
        run: npm run pack:check

      - name: Run doctor
        run: npm run doctor

  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
